<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWatch X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h1>SmartWatch X Pro</h1>
        <ul class="nav-links" id="navLinks">
            <li><a href="#hero">Home</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#footer">Contact</a></li>
        </ul>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </nav>
</header>

<section id="hero" class="hero">
    <div class="hero-text">
        <h2>Smart Technology on Your Wrist</h2>
        <p>Track your health, stay connected, and look stylish.</p>
        <button onclick="buyNow()">Shop Now</button>
    </div>
    <img src="https://images.unsplash.com/photo-1518441902110-9a9a6c2cfdaf" alt="Smartwatch">
</section>

<section id="features" class="features">
    <h2>Features</h2>
    <div class="feature-grid">
        <div class="card">Stylish Design</div>
        <div class="card">Health Tracking</div>
        <div class="card">Long Battery</div>
        <div class="card">Water Resistant</div>
    </div>
</section>

<section class="countdown">
    <h2>Limited Offer Ends In:</h2>
    <p id="timer"></p>
</section>

<footer id="footer">
    <p>© 2026 SmartWatch X</p>
    <div>
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
        <a href="#">Instagram</a>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
